services:
  cloudflare-mesh:
    build: .
    container_name: cloudflare-warp-client
    restart: unless-stopped

    # privileged is required so the container can write net.ipv4.conf.all.rp_filter=0
    # and have it stick. Docker daemon continuously resets rp_filter=2 on bridge
    # interfaces it manages; without privileged the container's proc writes are
    # blocked or immediately overridden. cap_add entries are kept for clarity.
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE

    # Expose the TUN device so WARP can open a tunnel interface.
    devices:
      - /dev/net/tun:/dev/net/tun

    # ip_forward and rp_filter are applied by the entrypoint at startup via
    # sysctl. With network_mode: host these write directly to the host's
    # network namespace — no host-level configuration required.

    environment:
      # Replace the token below with your actual connector token.
      # You can also pass it at runtime:
      #   CONNECTOR_TOKEN=<token> docker compose up
      - CONNECTOR_TOKEN=

    volumes:
      # Persist WARP registration state so re-creating the container
      # does not require re-registering the connector.
      - warp-data:/var/lib/cloudflare-warp

    # Mount /run as tmpfs so runtime files (dbus pid, sockets, etc.) are always
    # cleared when the container stops — prevents stale file errors on restart.
    tmpfs:
      - /run

    # Healthcheck mirrors the HEALTHCHECK in the Dockerfile.
    # If WARP is not Connected after 3 consecutive failures the container is
    # marked unhealthy. The watchdog in entrypoint.sh then kills warp-svc,
    # the container exits, and restart: unless-stopped brings it back up.
    healthcheck:
      test: ["CMD-SHELL", "warp-cli --accept-tos status 2>/dev/null | grep -q 'Connected' || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

    # network_mode host gives WARP direct access to the host network stack,
    # which is the simplest setup for a mesh/connector node. Remove this line
    # (and add explicit port mappings instead) if you prefer bridge networking.
    network_mode: host

volumes:
  warp-data:
