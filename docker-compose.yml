services:
  warp-cli:
    build:
      context: .
    container_name: warp-cli
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      net.ipv4.ip_forward: "1"
    environment:
      WARP_CONNECTOR_TOKEN: "${WARP_CONNECTOR_TOKEN:?set WARP_CONNECTOR_TOKEN in your environment or .env}"
      WARP_WAIT_FOR_CONNECT: "true"
    volumes:
      - warp-state:/var/lib/cloudflare-warp

volumes:
  warp-state:
